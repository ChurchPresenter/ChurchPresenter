name: Cleanup Artifacts

on:
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete artifacts older than this many days'
        required: false
        default: '14'
        type: number
      dry_run:
        description: 'List artifacts without deleting'
        required: false
        default: false
        type: boolean

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const maxAgeDays = ${{ inputs.max_age_days || 14 }};
            const dryRun = ${{ inputs.dry_run || false }};
            const cutoff = new Date(Date.now() - maxAgeDays * 24 * 60 * 60 * 1000);

            console.log(`Cleaning artifacts older than ${maxAgeDays} days (before ${cutoff.toISOString()})`);
            if (dryRun) console.log('DRY RUN — no artifacts will be deleted');

            let deleted = 0;
            let totalSize = 0;
            let page = 1;

            while (true) {
              const { data: { artifacts, total_count } } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });

              if (artifacts.length === 0) break;

              for (const artifact of artifacts) {
                const createdAt = new Date(artifact.created_at);
                if (createdAt < cutoff) {
                  const sizeMB = (artifact.size_in_bytes / 1024 / 1024).toFixed(2);
                  console.log(`${dryRun ? '[DRY RUN] Would delete' : 'Deleting'}: ${artifact.name} (${sizeMB} MB, created ${artifact.created_at})`);

                  if (!dryRun) {
                    await github.rest.actions.deleteArtifact({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      artifact_id: artifact.id,
                    });
                  }

                  deleted++;
                  totalSize += artifact.size_in_bytes;
                }
              }

              if (artifacts.length < 100) break;
              page++;
            }

            const totalMB = (totalSize / 1024 / 1024).toFixed(2);
            console.log(`\n${dryRun ? 'Would delete' : 'Deleted'} ${deleted} artifact(s), freeing ${totalMB} MB`);

      - name: Delete old workflow run logs
        uses: actions/github-script@v7
        with:
          script: |
            const maxAgeDays = ${{ inputs.max_age_days || 14 }};
            const dryRun = ${{ inputs.dry_run || false }};
            const cutoff = new Date(Date.now() - maxAgeDays * 24 * 60 * 60 * 1000);

            console.log(`\nCleaning workflow runs older than ${maxAgeDays} days (before ${cutoff.toISOString()})`);
            if (dryRun) console.log('DRY RUN — no runs will be deleted');

            let deleted = 0;
            let page = 1;

            while (true) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });

              if (workflow_runs.length === 0) break;

              for (const run of workflow_runs) {
                const createdAt = new Date(run.created_at);
                if (createdAt < cutoff) {
                  console.log(`${dryRun ? '[DRY RUN] Would delete' : 'Deleting'}: ${run.name} #${run.run_number} (${run.status}, created ${run.created_at})`);

                  if (!dryRun) {
                    await github.rest.actions.deleteWorkflowRun({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      run_id: run.id,
                    });
                  }

                  deleted++;
                }
              }

              if (workflow_runs.length < 100) break;
              page++;
            }

            console.log(`\n${dryRun ? 'Would delete' : 'Deleted'} ${deleted} workflow run(s)`);
