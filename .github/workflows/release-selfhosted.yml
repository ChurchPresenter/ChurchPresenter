name: Release (Self-Hosted)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  version:
    runs-on: [self-hosted, Linux]
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from commit count
        id: version
        run: |
          YEAR=$(date +%y)
          COMMITS=$(git rev-list --count HEAD)
          MAJOR=$YEAR
          MINOR=$((COMMITS / 256))
          PATCH=$((COMMITS % 256))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  build-windows:
    needs: [version]
    runs-on: [self-hosted, Windows]
    env:
      WINDOWS_SIGNING_ENABLED: ${{ secrets.WINDOWS_CERTIFICATE_PFX != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Windows Code Signing ────────────────────────────────────────────────
      - name: Write Windows signing configuration
        if: ${{ env.WINDOWS_SIGNING_ENABLED == 'true' }}
        shell: bash
        env:
          CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          SIGNING_DIR="$RUNNER_TEMP/signing/windows"
          mkdir -p "$SIGNING_DIR"
          echo "$CERTIFICATE_PFX" | base64 --decode > "$SIGNING_DIR/churchpresenter-windows.pfx"
          {
            echo "certFile=churchpresenter-windows.pfx"
            echo "certPassword=${CERTIFICATE_PASSWORD}"
            echo "timestampUrl=http://timestamp.digicert.com"
            echo "subjectName=Church Presenter"
          } > "$SIGNING_DIR/signing.properties"
          echo "desktop.signing.repo.path=$RUNNER_TEMP/signing" >> local.properties
          echo "Windows signing configuration written"

      - name: Build and sign installer
        run: ./gradlew :composeApp:clean :composeApp:signWindowsMsi --no-daemon --no-build-cache

      - name: Upload to Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          $VERSION = "${{ needs.version.outputs.version }}"
          $NOTES = "Download the installer for your platform below."
          $headers = @{ Authorization = "token $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          $body = @{ tag_name = $VERSION; name = "ChurchPresenter $VERSION"; body = $NOTES } | ConvertTo-Json
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/ChurchPresenter/Releases/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
          } catch {
            Write-Host "Release may already exist, continuing..."
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ChurchPresenter/Releases/releases/tags/$VERSION" -Headers $headers
          $uploadUrl = $release.upload_url -replace '\{\?.*\}', ''
          foreach ($f in Get-ChildItem "composeApp\build\compose\binaries\main\msi\*.msi") {
            $uploadHeaders = @{ Authorization = "token $env:GH_TOKEN"; Accept = "application/vnd.github+json"; "Content-Type" = "application/octet-stream" }
            Invoke-RestMethod -Uri "${uploadUrl}?name=$($f.Name)" -Method Post -Headers $uploadHeaders -InFile $f.FullName
          }

  build-macos:
    needs: [version]
    runs-on: [self-hosted, macOS]
    env:
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── macOS Code Signing & Notarization ──────────────────────────────────
      - name: Import Developer ID certificate into temporary keychain
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          EXISTING=$(security list-keychains -d user | tr -d '"' | awk '{$1=$1};1')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Signing certificate imported"

      - name: Write signing configuration
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          IDENTITY_NAME: ${{ secrets.MACOS_IDENTITY_NAME }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          SIGNING_DIR="$RUNNER_TEMP/signing/macos"
          mkdir -p "$SIGNING_DIR"
          {
            echo "identityName=${IDENTITY_NAME}"
            echo "teamId=${TEAM_ID}"
            echo "appleId=${APPLE_ID}"
            echo "notarizationPassword=${NOTARIZATION_PASSWORD}"
            echo "keychain=${KEYCHAIN_PATH}"
          } > "$SIGNING_DIR/signing.properties"
          echo "desktop.signing.repo.path=$RUNNER_TEMP/signing" >> local.properties
          echo "Signing configuration written"

      - name: Build signed DMG
        run: ./gradlew :composeApp:clean :composeApp:packageDmg --no-daemon --no-build-cache

      - name: Notarize DMG (upload to Apple + wait for approval + staple ticket)
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        run: ./gradlew :composeApp:notarizeDmg --no-daemon

      - name: Rename DMG with architecture
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            SUFFIX="arm64"
          else
            SUFFIX="x64"
          fi
          for f in composeApp/build/compose/binaries/main/dmg/*.dmg; do
            mv "$f" "${f%.dmg}-${SUFFIX}.dmg"
          done

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          NOTES="Download the installer for your platform below."
          # Create release (ignore error if already exists)
          curl -s -X POST "https://api.github.com/repos/ChurchPresenter/Releases/releases" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"tag_name\":\"$VERSION\",\"name\":\"ChurchPresenter $VERSION\",\"body\":\"$NOTES\"}" || true
          # Get upload URL
          UPLOAD_URL=$(curl -s "https://api.github.com/repos/ChurchPresenter/Releases/releases/tags/$VERSION" \
            -H "Authorization: token $GH_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          for f in composeApp/build/compose/binaries/main/dmg/*.dmg; do
            FILENAME=$(basename "$f")
            curl -s -X POST "${UPLOAD_URL}?name=${FILENAME}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Delete temporary keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
            echo "Keychain cleaned up"
          fi

  build-linux:
    needs: [version]
    runs-on: [self-hosted, Linux]
    env:
      LINUX_SIGNING_ENABLED: ${{ secrets.LINUX_GPG_PRIVATE_KEY != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Linux GPG Signing ──────────────────────────────────────────────────
      - name: Import GPG key and write signing configuration
        if: ${{ env.LINUX_SIGNING_ENABLED == 'true' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null | grep 'sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          sudo apt-get install -y dpkg-sig
          SIGNING_DIR="$RUNNER_TEMP/signing/linux"
          mkdir -p "$SIGNING_DIR"
          {
            echo "gpgKeyId=${GPG_KEY_ID}"
            echo "gpgPassphrase=${GPG_PASSPHRASE}"
          } > "$SIGNING_DIR/signing.properties"
          echo "desktop.signing.repo.path=$RUNNER_TEMP/signing" >> local.properties
          echo "Linux signing configuration written (key: $GPG_KEY_ID)"

      - name: Build and sign installer
        run: ./gradlew :composeApp:clean :composeApp:signLinuxDeb --no-daemon --no-build-cache

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          NOTES="Download the installer for your platform below."
          # Create release (ignore error if already exists)
          curl -s -X POST "https://api.github.com/repos/ChurchPresenter/Releases/releases" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"tag_name\":\"$VERSION\",\"name\":\"ChurchPresenter $VERSION\",\"body\":\"$NOTES\"}" || true
          # Get upload URL
          UPLOAD_URL=$(curl -s "https://api.github.com/repos/ChurchPresenter/Releases/releases/tags/$VERSION" \
            -H "Authorization: token $GH_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          for f in composeApp/build/compose/binaries/main/deb/*.deb; do
            FILENAME=$(basename "$f")
            curl -s -X POST "${UPLOAD_URL}?name=${FILENAME}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
