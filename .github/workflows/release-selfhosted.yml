name: Release (Self-Hosted)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: [self-hosted, Linux]
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      prev_tag: ${{ steps.version.outputs.PREV_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from commit count
        id: version
        run: |
          YEAR=$(date +%y)
          COMMITS=$(git rev-list --count HEAD)
          MAJOR=$YEAR
          MINOR=$((COMMITS / 256))
          PATCH=$((COMMITS % 256))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: [version]
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageMsi --no-daemon --no-build-cache

      - name: Upload to Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          $VERSION = "${{ needs.version.outputs.version }}"
          $PREV_TAG = "${{ needs.version.outputs.prev_tag }}"
          if ($PREV_TAG) {
            $NOTES = "**Full Changelog**: https://github.com/ChurchPresenter/ChurchPresenter/compare/${PREV_TAG}...${VERSION}"
          } else {
            $NOTES = "**Full Changelog**: https://github.com/ChurchPresenter/ChurchPresenter/releases/tag/${VERSION}"
          }
          $headers = @{ Authorization = "token $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          $body = @{ tag_name = $VERSION; name = "ChurchPresenter $VERSION"; body = $NOTES } | ConvertTo-Json
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/ChurchPresenter/Releases/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
          } catch {
            Write-Host "Release may already exist, continuing..."
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ChurchPresenter/Releases/releases/tags/$VERSION" -Headers $headers
          $uploadUrl = $release.upload_url -replace '\{\?.*\}', ''
          foreach ($f in Get-ChildItem "composeApp\build\compose\binaries\main\msi\*.msi") {
            $uploadHeaders = @{ Authorization = "token $env:GH_TOKEN"; Accept = "application/vnd.github+json"; "Content-Type" = "application/octet-stream" }
            Invoke-RestMethod -Uri "${uploadUrl}?name=$($f.Name)" -Method Post -Headers $uploadHeaders -InFile $f.FullName
          }

  build-macos:
    needs: [version]
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDmg --no-daemon --no-build-cache

      - name: Rename DMG with architecture
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            SUFFIX="arm64"
          else
            SUFFIX="x64"
          fi
          for f in composeApp/build/compose/binaries/main/dmg/*.dmg; do
            mv "$f" "${f%.dmg}-${SUFFIX}.dmg"
          done

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PREV_TAG="${{ needs.version.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            NOTES="**Full Changelog**: https://github.com/ChurchPresenter/ChurchPresenter/compare/${PREV_TAG}...${VERSION}"
          else
            NOTES="**Full Changelog**: https://github.com/ChurchPresenter/ChurchPresenter/releases/tag/${VERSION}"
          fi
          # Create release (ignore error if already exists)
          curl -s -X POST "https://api.github.com/repos/ChurchPresenter/Releases/releases" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"tag_name\":\"$VERSION\",\"name\":\"ChurchPresenter $VERSION\",\"body\":\"$NOTES\"}" || true
          # Get upload URL
          UPLOAD_URL=$(curl -s "https://api.github.com/repos/ChurchPresenter/Releases/releases/tags/$VERSION" \
            -H "Authorization: token $GH_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          for f in composeApp/build/compose/binaries/main/dmg/*.dmg; do
            FILENAME=$(basename "$f")
            curl -s -X POST "${UPLOAD_URL}?name=${FILENAME}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done

  build-linux:
    needs: [version]
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDeb --no-daemon --no-build-cache

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PREV_TAG="${{ needs.version.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            NOTES="**Full Changelog**: https://github.com/ChurchPresenter/ChurchPresenter/compare/${PREV_TAG}...${VERSION}"
          else
            NOTES="**Full Changelog**: https://github.com/ChurchPresenter/ChurchPresenter/releases/tag/${VERSION}"
          fi
          # Create release (ignore error if already exists)
          curl -s -X POST "https://api.github.com/repos/ChurchPresenter/Releases/releases" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"tag_name\":\"$VERSION\",\"name\":\"ChurchPresenter $VERSION\",\"body\":\"$NOTES\"}" || true
          # Get upload URL
          UPLOAD_URL=$(curl -s "https://api.github.com/repos/ChurchPresenter/Releases/releases/tags/$VERSION" \
            -H "Authorization: token $GH_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          for f in composeApp/build/compose/binaries/main/deb/*.deb; do
            FILENAME=$(basename "$f")
            curl -s -X POST "${UPLOAD_URL}?name=${FILENAME}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
