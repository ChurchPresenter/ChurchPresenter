name: Tests

# The three build workflows are all workflow_dispatch-only, so until this existed nothing ran
# automatically on a push or a pull request -- including the submodule test suites, which were
# green but unenforced. This runs the whole suite on every push and PR.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  # A newer push to the same branch makes an in-flight run redundant.
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required: composeApp mounts the submodules' sources via kotlin.srcDir, so the app
          # does not even compile without them checked out.
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: App unit tests
        run: ./gradlew :composeApp:jvmTest

      # Each submodule is its own Gradle build with its own wrapper, so they cannot be reached
      # from the root build and are invoked individually. `if: always()` keeps a failure in one
      # suite from hiding the results of the others.
      - name: Presentation Engine tests
        if: always()
        working-directory: composeApp/src/jvmMain/appResources/common/ChurchPresenter-PresentationEngine
        run: chmod +x gradlew && ./gradlew test

      - name: Bible Lookup Engine tests
        if: always()
        working-directory: composeApp/src/jvmMain/appResources/common/ChurchPresenter-BLE
        run: chmod +x gradlew && ./gradlew test

      - name: LottieGen tests
        if: always()
        working-directory: composeApp/src/jvmMain/appResources/common/ChurchPresenter-LottieGen
        run: chmod +x gradlew && ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            composeApp/build/reports/tests/
            composeApp/build/test-results/
            composeApp/src/jvmMain/appResources/common/*/build/reports/tests/
            composeApp/src/jvmMain/appResources/common/*/build/test-results/
