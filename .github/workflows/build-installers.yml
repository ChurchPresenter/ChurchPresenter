name: Build Installers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      shell: bash

    - name: Build Windows EXE
      run: ./gradlew packageReleaseExe --no-daemon
      shell: bash
      env:
        GRADLE_OPTS: "-Xmx10240M -XX:MaxMetaspaceSize=2048M"

    - name: Build Windows MSI
      run: ./gradlew packageReleaseMsi --no-daemon
      shell: bash
      env:
        GRADLE_OPTS: "-Xmx10240M -XX:MaxMetaspaceSize=2048M"
      continue-on-error: true

    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe-installer
        path: composeApp/build/compose/binaries/main-release/exe/*.exe
        if-no-files-found: error

    - name: Upload Windows MSI
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi-installer
        path: composeApp/build/compose/binaries/main-release/msi/*.msi
        if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build macOS DMG
      run: ./gradlew packageReleaseDmg --no-daemon
      env:
        GRADLE_OPTS: "-Xmx10240M -XX:MaxMetaspaceSize=2048M"

    - name: Upload macOS DMG
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg-installer
        path: composeApp/build/compose/binaries/main-release/dmg/*.dmg
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Linux DEB
      run: ./gradlew packageReleaseDeb --no-daemon
      env:
        GRADLE_OPTS: "-Xmx10240M -XX:MaxMetaspaceSize=2048M"

    - name: Upload Linux DEB
      uses: actions/upload-artifact@v4
      with:
        name: linux-deb-package
        path: composeApp/build/compose/binaries/main-release/deb/*.deb
        if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows-exe-installer/*
          windows-msi-installer/*
          macos-dmg-installer/*
          linux-deb-package/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

