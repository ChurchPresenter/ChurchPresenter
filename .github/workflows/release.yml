name: Release All Platforms

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageMsi --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main/msi
          retention-days: 1

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDmg --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: composeApp/build/compose/binaries/main/dmg
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDeb --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb
          retention-days: 1

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from commit count
        id: version
        run: |
          YEAR=$(date +%y)
          COMMITS=$(git rev-list --count HEAD)
          MAJOR=$YEAR
          MINOR=$((COMMITS / 256))
          PATCH=$((COMMITS % 256))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release/windows

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-arm64
          path: release/macos-arm64

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-x64
          path: release/macos-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release/linux

      - name: Rename macOS DMGs for architecture
        run: |
          for f in release/macos-arm64/*.dmg; do
            mv "$f" "${f%.dmg}-arm64.dmg"
          done
          for f in release/macos-x64/*.dmg; do
            mv "$f" "${f%.dmg}-x64.dmg"
          done

      - name: List release files
        run: find release -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ChurchPresenter ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            release/windows/*.msi
            release/macos-arm64/*.dmg
            release/macos-x64/*.dmg
            release/linux/*.deb
