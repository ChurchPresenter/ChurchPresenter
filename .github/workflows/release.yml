name: Build, Sign & Release All Platforms

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageMsi --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main/msi
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    env:
      # Expose secret as env var so it can be used in step if: conditions
      # (secrets context is not allowed directly in if: expressions)
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── macOS Code Signing & Notarization ──────────────────────────────────
      # Skipped automatically if MACOS_CERTIFICATE_P12 secret is not set.

      - name: Import Developer ID certificate into temporary keychain
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          EXISTING=$(security list-keychains -d user | tr -d '"' | awk '{$1=$1};1')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Signing certificate imported ✅"

      - name: Write signing configuration
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          IDENTITY_NAME: ${{ secrets.MACOS_IDENTITY_NAME }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          SIGNING_DIR="$RUNNER_TEMP/signing/macos"
          mkdir -p "$SIGNING_DIR"
          {
            echo "identityName=${IDENTITY_NAME}"
            echo "teamId=${TEAM_ID}"
            echo "appleId=${APPLE_ID}"
            echo "notarizationPassword=${NOTARIZATION_PASSWORD}"
            echo "keychain=${KEYCHAIN_PATH}"
          } > "$SIGNING_DIR/signing.properties"
          echo "desktop.signing.repo.path=$RUNNER_TEMP/signing" >> local.properties
          echo "Signing configuration written ✅"

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Build signed DMG
        run: ./gradlew :composeApp:clean :composeApp:packageDmg --no-daemon --no-build-cache

      - name: Notarize DMG (upload to Apple + wait for approval + staple ticket)
        if: ${{ env.MACOS_SIGNING_ENABLED == 'true' }}
        run: ./gradlew :composeApp:notarizeDmg --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: composeApp/build/compose/binaries/main/dmg
          retention-days: 1

      # ── Cleanup ────────────────────────────────────────────────────────────

      - name: Delete temporary keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
            echo "Keychain cleaned up ✅"
          fi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDeb --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb
          retention-days: 1

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from commit count
        id: version
        run: |
          YEAR=$(date +%y)
          COMMITS=$(git rev-list --count HEAD)
          MAJOR=$YEAR
          MINOR=$((COMMITS / 256))
          PATCH=$((COMMITS % 256))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release/linux

      - name: Rename macOS DMG (add arm64 suffix)
        run: |
          for f in release/macos/*.dmg; do
            mv "$f" "${f%.dmg}-arm64.dmg"
          done

      - name: List release files
        run: find release -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ChurchPresenter/Releases
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ChurchPresenter ${{ steps.version.outputs.VERSION }}
          body: |
            Download the installer for your platform below.
          files: |
            release/windows/*.msi
            release/macos/*.dmg
            release/linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
