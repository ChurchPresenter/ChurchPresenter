name: Build All Platforms

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Get short commit hash
        id: vars
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageMsi --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchPresenter-Windows-${{ steps.vars.outputs.SHORT_SHA }}
          path: composeApp/build/compose/binaries/main/msi
          retention-days: 2

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get short commit hash
        id: vars
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDmg --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchPresenter-macOS-${{ matrix.arch }}-${{ steps.vars.outputs.SHORT_SHA }}
          path: composeApp/build/compose/binaries/main/dmg
          retention-days: 2

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get short commit hash
        id: vars
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:packageDeb --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchPresenter-Linux-${{ steps.vars.outputs.SHORT_SHA }}
          path: composeApp/build/compose/binaries/main/deb
          retention-days: 2
