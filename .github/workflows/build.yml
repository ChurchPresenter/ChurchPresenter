name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact-path: composeApp/build/compose/binaries/main/dmg
            artifact-name: ChurchPresenter-macOS
          - os: windows-latest
            task: packageMsi
            artifact-path: composeApp/build/compose/binaries/main/msi
            artifact-name: ChurchPresenter-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build installer
        run: ./gradlew :composeApp:clean :composeApp:${{ matrix.task }} --no-daemon --no-build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.run_number }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

