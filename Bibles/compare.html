<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPB Bible Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f3ee;
            --surface: #fffef9;
            --border: #e2ddd4;
            --border-light: #eeebe5;
            --text: #2c2520;
            --text-muted: #8a7f72;
            --accent: #8b4513;
            --accent-hover: #6d350f;
            --remove-bg: #fff0ed;
            --remove-gutter: #fdd;
            --remove-text: #9b2c2c;
            --remove-word: #fbbfb0;
            --add-bg: #eef7ee;
            --add-gutter: #d4edda;
            --add-text: #276749;
            --add-word: #b2dfc0;
            --header-bg: #f0ece4;
            --highlight: #c9942a;
            --section-bg: #f5f0e6;
            --section-border: #c9942a;
            --section-text: #6b5830;
            --chip-bg: #f0ece4;
            --chip-border: #d6d0c5;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-mono: 'JetBrains Mono', 'Menlo', monospace;
            --radius: 3px;
        }

        html.dark {
            --bg: #111010;
            --surface: #1a1918;
            --border: #2e2b28;
            --border-light: #242220;
            --text: #d4cfc7;
            --text-muted: #6e665c;
            --accent: #c9942a;
            --accent-hover: #daa740;
            --remove-bg: #2a1515;
            --remove-gutter: #351c1c;
            --remove-text: #e87070;
            --remove-word: #5c2020;
            --add-bg: #132413;
            --add-gutter: #1a2e1a;
            --add-text: #6ecf6e;
            --add-word: #1e4a1e;
            --header-bg: #1e1d1a;
            --highlight: #c9942a;
            --section-bg: #1e1c16;
            --section-border: #5a4520;
            --section-text: #c9942a;
            --chip-bg: #1e1d1a;
            --chip-border: #2e2b28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-display);
            background: var(--bg);
            color: var(--text);
            padding: 12px 16px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .header span {
            font-size: 13px;
            color: var(--text-muted);
        }
        input[type="file"] {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
        }
        button {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 12px;
            padding: 5px 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.15s;
        }
        button:hover { background: var(--accent-hover); }

        /* ── Comparison container ── */
        .comparison { display: none; flex: 1; min-height: 0; flex-direction: column; position: relative; }
        .comparison.active { display: flex; }

        /* ── Loading ── */
        .loading {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.25);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        html.dark .loading { background: rgba(0,0,0,0.5); }
        .loading.active { display: flex; }
        .spinner {
            width: 28px; height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        .loading div:last-child {
            font-size: 13px;
            color: var(--text-muted);
            background: var(--surface);
            padding: 4px 12px;
            border-radius: var(--radius);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Diff content wrapper ── */
        .diff-content { display: none; }
        .diff-content.active {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            padding-top: 10px;
        }

        /* ── Summary bar ── */
        .summary {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
            padding-bottom: 8px;
        }
        .summary-item {
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: var(--radius);
            background: var(--chip-bg);
            color: var(--text-muted);
        }
        .summary-item.match { color: var(--add-text); background: var(--add-bg); }
        .summary-item.diff { color: var(--remove-text); background: var(--remove-bg); }

        /* ── Nav buttons ── */
        .nav-buttons {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            padding-bottom: 8px;
        }
        .nav-buttons button {
            background: var(--chip-bg);
            color: var(--text-muted);
            border: 1px solid var(--chip-border);
            font-size: 11px;
            padding: 4px 10px;
        }
        .nav-buttons button:hover { background: var(--border); color: var(--text); }
        .nav-buttons button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .diff-stats { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: auto; }

        /* ── Overview panel ── */
        .overview {
            display: none;
            flex-shrink: 0;
            max-height: 28vh;
            overflow-y: auto;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
        }
        .overview.active { display: block; }
        .overview-books { display: flex; flex-wrap: wrap; gap: 4px; }
        .book-chip {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 2px 7px;
            border-radius: var(--radius);
            cursor: pointer;
            border: 1px solid var(--chip-border);
            background: var(--chip-bg);
            color: var(--text-muted);
            user-select: none;
            transition: all 0.12s;
        }
        .book-chip:hover { background: var(--border); }
        .book-chip.has-diffs { background: var(--remove-bg); border-color: var(--remove-text); color: var(--remove-text); font-weight: 500; }
        .book-chip.no-diffs { opacity: 0.45; }
        .book-chip.expanded { background: var(--accent); color: #fff; border-color: var(--accent); }
        .book-chip.expanded.has-diffs { background: var(--remove-text); border-color: var(--remove-text); color: #fff; }
        .chapter-panel { display: none; width: 100%; padding: 6px 0 2px; }
        .chapter-panel.active { display: flex; flex-wrap: wrap; gap: 3px; }
        .chapter-chip {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 2px;
            cursor: pointer;
            border: 1px solid var(--border-light);
            background: var(--bg);
            color: var(--text-muted);
            transition: background 0.12s;
        }
        .chapter-chip:hover { background: var(--border); }
        .chapter-chip.has-diffs { background: var(--remove-bg); border-color: var(--remove-text); color: var(--remove-text); font-weight: 500; }
        .chapter-chip.no-diffs { opacity: 0.35; }

        /* ── Diff container ── */
        .diff-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: auto;
            flex: 1;
            min-height: 0;
        }
        .diff-header-row {
            display: flex;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
        }
        .diff-header-row > div {
            flex: 1;
            padding: 5px 12px;
            font-family: var(--font-mono);
            font-weight: 500;
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .diff-header-row > div + div { border-left: 1px solid var(--border); }

        /* ── Section headers ── */
        .section-header {
            display: flex;
            position: sticky;
            top: 28px;
            z-index: 5;
            background: var(--section-bg);
            border-bottom: 1px solid var(--section-border);
        }
        .section-header .section-label {
            flex: 1;
            padding: 3px 12px;
            text-align: center;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 12px;
            color: var(--section-text);
            letter-spacing: 0.04em;
        }

        /* ── Diff rows ── */
        .diff-row { display: flex; border-bottom: 1px solid var(--border-light); }
        .diff-row:hover { background: #faf8f4; }
        html.dark .diff-row:hover { background: #1f1e1b; }
        .diff-cell {
            flex: 1;
            display: flex;
            min-height: 18px;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 18px;
        }
        .diff-cell + .diff-cell { border-left: 1px solid var(--border); }
        .line-num {
            min-width: 36px;
            width: 36px;
            text-align: right;
            padding-right: 6px;
            color: var(--text-muted);
            user-select: none;
            background: var(--header-bg);
            border-right: 1px solid var(--border-light);
            flex-shrink: 0;
            font-size: 10px;
        }
        .line-num.diff-marker { color: var(--remove-text); font-weight: 500; }
        .line-num.diff-marker.add { color: var(--add-text); }
        .line-content { flex: 1; padding-left: 6px; white-space: pre-wrap; word-break: break-word; }

        .diff-cell.add { background: var(--add-bg); }
        .diff-cell.add .line-num { background: var(--add-gutter); }
        .diff-cell.remove { background: var(--remove-bg); }
        .diff-cell.remove .line-num { background: var(--remove-gutter); }
        .diff-cell.empty { background: var(--bg); }
        .diff-cell.empty .line-content { color: transparent; }

        .diff-row.highlight > .diff-cell {
            outline: 2px solid var(--highlight);
            outline-offset: -2px;
        }

        .char-diff-add { background: var(--add-word); padding: 0 1px; border-radius: 2px; }
        .char-diff-remove { background: var(--remove-word); padding: 0 1px; border-radius: 2px; }

        /* ── Scrollbar ── */
        .diff-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .diff-container::-webkit-scrollbar-track { background: transparent; }
        .diff-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .diff-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        .overview::-webkit-scrollbar { width: 4px; }
        .overview::-webkit-scrollbar-track { background: transparent; }
        .overview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Theme toggle ── */
        .theme-toggle {
            background: var(--chip-bg);
            color: var(--text-muted);
            border: 1px solid var(--chip-border);
            font-size: 14px;
            padding: 3px 8px;
            margin-left: auto;
            line-height: 1;
        }
        .theme-toggle:hover { color: var(--text); background: var(--border); }
        html.dark { color-scheme: dark; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SPB Compare</h1>
        <span>Select two .spb files:</span>
        <input type="file" id="file1" accept=".spb">
        <input type="file" id="file2" accept=".spb">
        <button onclick="compareFiles()">Compare</button>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light theme">&#9790;</button>
    </div>

    <div class="comparison" id="comparison">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Comparing files...</div>
        </div>

        <div class="diff-content" id="diffContent">
            <div class="summary" id="summary"></div>

            <div class="nav-buttons" id="navButtons">
                <button id="btnAll" class="active" onclick="setFilter('all')">All</button>
                <button id="btnDiffs" onclick="setFilter('diffs')">Changes Only</button>
                <button onclick="jumpToDiff(-1)">&#8593; Prev</button>
                <button onclick="jumpToDiff(1)">Next &#8595;</button>
                <button id="btnOverview" onclick="toggleOverview()">Overview</button>
            </div>
            <div class="overview" id="overview"></div>

            <div class="diff-container" id="diffContainer">
                <div class="diff-header-row">
                    <div id="header1"></div>
                    <div id="header2"></div>
                </div>
                <div id="diffBody"></div>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('spb-theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDark ? '\u2600' : '\u263E';
        }
        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('spb-theme');
            const prefersDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (prefersDark) {
                document.documentElement.classList.add('dark');
                document.querySelector('.theme-toggle').textContent = '\u2600';
            }
        })();

        let currentLines1, currentLines2, currentFilter = 'all';
        let diffIndices = [];
        let currentDiffIndex = -1;
        let cachedDiff = null;
        let bookNames = {};
        let bookStats = [];

        const workerCode = `
        self.onmessage = function(e) {
            const { lines1, lines2 } = e.data;
            const result = computeDiff(lines1, lines2);
            self.postMessage(result);
        };

        function getLineKey(line) {
            if (!line) return null;
            if (line.startsWith('##')) {
                const colon = line.indexOf(':');
                return colon !== -1 ? line.substring(0, colon + 1) : line;
            }
            const tab = line.indexOf('\\t');
            if (tab !== -1) return line.substring(0, tab);
            return line;
        }

        function getVerseText(line) {
            if (!line) return '';
            let pos = 0;
            for (let t = 0; t < 4; t++) {
                const idx = line.indexOf('\\t', pos);
                if (idx === -1) return line;
                pos = idx + 1;
            }
            return line.substring(pos);
        }

        function computeDiff(lines1, lines2) {
            const left = [], right = [];
            const map2 = new Map();
            for (let j = 0; j < lines2.length; j++) {
                const key = getLineKey(lines2[j]);
                if (key !== null) {
                    if (!map2.has(key)) map2.set(key, []);
                    map2.get(key).push(j);
                }
            }
            const used2 = new Uint8Array(lines2.length);
            const map2pos = new Map();
            let ln1 = 1, ln2 = 1;
            let j2 = 0;

            for (let i = 0; i < lines1.length; i++) {
                const line1 = lines1[i];
                const key = getLineKey(line1);
                let matchIdx = -1;
                if (key !== null && map2.has(key)) {
                    const indices = map2.get(key);
                    const pos = map2pos.get(key) || 0;
                    if (pos < indices.length) {
                        matchIdx = indices[pos];
                        map2pos.set(key, pos + 1);
                    }
                }

                if (matchIdx !== -1) {
                    for (let j = j2; j < matchIdx; j++) {
                        if (!used2[j]) {
                            const fKey2 = getLineKey(lines2[j]);
                            const fCont2 = fKey2 ? fKey2.match(/^(B\\d+C\\d+V\\d+)0$/) : null;
                            if (fCont2 && right.length > 0) {
                                const fBase2 = fCont2[1];
                                const pRight = right[right.length - 1];
                                const pRightKey = getLineKey(pRight.text);
                                if (pRightKey === fBase2) {
                                    const vText = getVerseText(lines2[j]);
                                    pRight.text = pRight.text + ' ' + vText;
                                    const pLeft = left[left.length - 1];
                                    if (pLeft.text !== pRight.text) {
                                        pLeft.status = 'remove';
                                        pRight.status = 'add';
                                    } else {
                                        pLeft.status = '';
                                        pRight.status = '';
                                    }
                                    used2[j] = 1;
                                    ln2++;
                                    continue;
                                }
                            }
                            left.push({ num: '', text: '', status: 'empty' });
                            right.push({ num: ln2++, text: lines2[j], status: 'add' });
                            used2[j] = 1;
                        }
                    }
                    j2 = matchIdx + 1;
                    used2[matchIdx] = 1;

                    if (line1 === lines2[matchIdx]) {
                        left.push({ num: ln1++, text: line1, status: '' });
                        right.push({ num: ln2++, text: lines2[matchIdx], status: '' });
                    } else {
                        left.push({ num: ln1++, text: line1, status: 'remove' });
                        right.push({ num: ln2++, text: lines2[matchIdx], status: 'add' });
                    }
                } else {
                    const contMatch = key ? key.match(/^(B\\d+C\\d+V\\d+)0$/) : null;
                    if (contMatch && left.length > 0) {
                        const baseKey = contMatch[1];
                        const prevLeft = left[left.length - 1];
                        const prevLeftKey = getLineKey(prevLeft.text);
                        if (prevLeftKey === baseKey) {
                            const verseText = getVerseText(line1);
                            prevLeft.text = prevLeft.text + ' ' + verseText;
                            const prevRight = right[right.length - 1];
                            if (prevLeft.text !== prevRight.text) {
                                prevLeft.status = 'remove';
                                prevRight.status = 'add';
                            } else {
                                prevLeft.status = '';
                                prevRight.status = '';
                            }
                            ln1++;
                            continue;
                        }
                    }
                    left.push({ num: ln1++, text: line1, status: 'remove' });
                    right.push({ num: '', text: '', status: 'empty' });
                }
            }

            for (let j = j2; j < lines2.length; j++) {
                if (!used2[j]) {
                    const fKey = getLineKey(lines2[j]);
                    const fContMatch = fKey ? fKey.match(/^(B\\d+C\\d+V\\d+)0$/) : null;
                    if (fContMatch && right.length > 0) {
                        const fBaseKey = fContMatch[1];
                        const prevRight = right[right.length - 1];
                        const prevRightKey = getLineKey(prevRight.text);
                        if (prevRightKey === fBaseKey) {
                            const verseText = getVerseText(lines2[j]);
                            prevRight.text = prevRight.text + ' ' + verseText;
                            const prevLeft = left[left.length - 1];
                            if (prevLeft.text !== prevRight.text) {
                                prevLeft.status = 'remove';
                                prevRight.status = 'add';
                            } else {
                                prevLeft.status = '';
                                prevRight.status = '';
                            }
                            ln2++;
                            continue;
                        }
                    }
                    left.push({ num: '', text: '', status: 'empty' });
                    right.push({ num: ln2++, text: lines2[j], status: 'add' });
                }
            }

            return { left, right };
        }
        `;

        const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        function compareFiles() {
            const file1Input = document.getElementById('file1');
            const file2Input = document.getElementById('file2');
            const file1 = file1Input.files[0];
            const file2 = file2Input.files[0];

            if (!file1 || !file2) { alert('Please select both files'); return; }

            document.getElementById('loading').classList.add('active');
            document.getElementById('diffContent').classList.remove('active');
            document.getElementById('comparison').classList.add('active');

            Promise.all([file1.text(), file2.text()]).then(([text1, text2]) => {
                const lines1 = text1.split('\n');
                const lines2 = text2.split('\n');
                currentLines1 = lines1;
                currentLines2 = lines2;

                document.getElementById('header1').textContent = file1.name;
                document.getElementById('header2').textContent = file2.name;

                const worker = new Worker(workerUrl);
                worker.onmessage = function(e) {
                    cachedDiff = e.data;
                    worker.terminate();
                    renderFromCachedDiff();
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('diffContent').classList.add('active');
                };
                worker.postMessage({ lines1, lines2 });
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('btnAll').className = filter === 'all' ? 'active' : '';
            document.getElementById('btnDiffs').className = filter === 'diffs' ? 'active' : '';
            document.getElementById('diffBody').style.display = 'none';
            document.getElementById('overview').style.display = 'none';
            document.getElementById('loading').classList.add('active');
            setTimeout(() => {
                renderFromCachedDiff();
                document.getElementById('loading').classList.remove('active');
                document.getElementById('diffBody').style.display = '';
                if (document.getElementById('btnOverview').classList.contains('active')) {
                    document.getElementById('overview').style.display = '';
                }
            }, 10);
        }

        function parseBookNames(lines) {
            for (const line of lines) {
                if (line === '-----') break;
                if (line.startsWith('##')) continue;
                const parts = line.split('\t');
                if (parts.length >= 2) {
                    const num = parseInt(parts[0]);
                    if (!isNaN(num) && !bookNames[num]) bookNames[num] = parts[1];
                }
            }
        }

        function parseVerseKey(text) {
            if (!text) return null;
            const m = text.match(/^B(\d+)C(\d+)V/);
            if (m) return { book: parseInt(m[1]), chap: parseInt(m[2]) };
            return null;
        }

        function renderFromCachedDiff() {
            const diff = cachedDiff;
            bookNames = {};
            parseBookNames(currentLines1);
            parseBookNames(currentLines2);

            let addCount = 0, removeCount = 0;
            for (const line of diff.left) if (line.status === 'remove') removeCount++;
            for (const line of diff.right) if (line.status === 'add') addCount++;

            const summary = document.getElementById('summary');
            const totalDiffs = addCount + removeCount;
            const allSame = totalDiffs === 0;
            summary.innerHTML = `
                <div class="summary-item ${allSame ? 'match' : 'diff'}">${allSame ? 'All match' : totalDiffs + ' changes'}</div>
                <div class="summary-item">Lines: ${currentLines1.length} / ${currentLines2.length}</div>
                <div class="summary-item" style="background:var(--remove-bg);color:var(--remove-text)">-${removeCount}</div>
                <div class="summary-item" style="background:var(--add-bg);color:var(--add-text)">+${addCount}</div>
            `;

            diffIndices = [];
            currentDiffIndex = -1;
            let html = '';
            let rowIdx = 0;

            const statsMap = {};
            let curBook = -1, curChap = -1;

            for (let i = 0; i < diff.left.length; i++) {
                const l1 = diff.left[i], l2 = diff.right[i];
                const status1 = l1.status, status2 = l2.status;
                const isDiff = status1 || status2;

                if (currentFilter === 'diffs' && !isDiff) continue;
                if (isDiff) diffIndices.push(rowIdx);

                const text = l1.text || l2.text;
                const vk = parseVerseKey(text);
                if (vk) {
                    if (!statsMap[vk.book]) {
                        statsMap[vk.book] = { diffs: 0, firstRowIdx: rowIdx, chapters: {} };
                    }
                    if (!statsMap[vk.book].chapters[vk.chap]) {
                        statsMap[vk.book].chapters[vk.chap] = { diffs: 0, firstRowIdx: rowIdx };
                    }
                    if (isDiff) {
                        statsMap[vk.book].diffs++;
                        statsMap[vk.book].chapters[vk.chap].diffs++;
                    }

                    if (vk.book !== curBook) {
                        curBook = vk.book;
                        curChap = vk.chap;
                        const name = bookNames[vk.book] || 'Book ' + vk.book;
                        html += `<div class="section-header"><div class="section-label">${name} \u2014 Chapter ${vk.chap}</div></div>`;
                    } else if (vk.chap !== curChap) {
                        curChap = vk.chap;
                        const name = bookNames[vk.book] || 'Book ' + vk.book;
                        html += `<div class="section-header"><div class="section-label">${name} \u2014 Chapter ${vk.chap}</div></div>`;
                    }
                }

                rowIdx++;

                const numClass1 = status1 === 'remove' ? 'line-num diff-marker' : 'line-num';
                const numClass2 = status2 === 'add' ? 'line-num diff-marker add' : 'line-num';
                const displayNum1 = status1 === 'empty' ? '' : l1.num;
                const displayNum2 = status2 === 'empty' ? '' : l2.num;

                let content1, content2;
                if (status1 === 'remove' && status2 === 'add') {
                    const wd = highlightWordDiffs(l1.text, l2.text);
                    content1 = wd.left;
                    content2 = wd.right;
                } else {
                    content1 = escapeHtml(l1.text);
                    content2 = escapeHtml(l2.text);
                }

                html += `<div class="diff-row" data-idx="${i}" data-row="${rowIdx - 1}"><div class="diff-cell ${status1}"><div class="${numClass1}">${displayNum1}</div><div class="line-content">${content1}</div></div><div class="diff-cell ${status2}"><div class="${numClass2}">${displayNum2}</div><div class="line-content">${content2}</div></div></div>`;
            }

            document.getElementById('diffBody').innerHTML = html;

            bookStats = [];
            const bookNums = Object.keys(statsMap).map(Number).sort((a, b) => a - b);
            for (const bn of bookNums) {
                const s = statsMap[bn];
                const chapters = [];
                const chapNums = Object.keys(s.chapters).map(Number).sort((a, b) => a - b);
                for (const cn of chapNums) {
                    chapters.push({ chapNum: cn, diffs: s.chapters[cn].diffs, firstRowIdx: s.chapters[cn].firstRowIdx });
                }
                bookStats.push({
                    bookNum: bn,
                    bookName: bookNames[bn] || `Book ${bn}`,
                    diffs: s.diffs,
                    firstRowIdx: s.firstRowIdx,
                    chapters
                });
            }

            renderOverview();
        }

        function renderOverview() {
            let html = '<div class="overview-books">';
            for (let bi = 0; bi < bookStats.length; bi++) {
                const b = bookStats[bi];
                const cls = b.diffs > 0 ? 'has-diffs' : 'no-diffs';
                html += `<div class="book-chip ${cls}" data-book="${bi}" onclick="toggleBook(this, ${bi})">${b.bookName} (${b.diffs})</div>`;
            }
            html += '</div>';

            for (let bi = 0; bi < bookStats.length; bi++) {
                const b = bookStats[bi];
                html += `<div class="chapter-panel" id="chapPanel${bi}">`;
                for (const ch of b.chapters) {
                    const cls = ch.diffs > 0 ? 'has-diffs' : 'no-diffs';
                    html += `<div class="chapter-chip ${cls}" onclick="jumpToRow(${ch.firstRowIdx})">Ch ${ch.chapNum} (${ch.diffs})</div>`;
                }
                html += '</div>';
            }

            document.getElementById('overview').innerHTML = html;
        }

        function toggleOverview() {
            const ov = document.getElementById('overview');
            const btn = document.getElementById('btnOverview');
            const willShow = !ov.classList.contains('active');

            document.getElementById('loading').classList.add('active');
            document.getElementById('diffContainer').style.display = 'none';
            ov.style.display = 'none';

            setTimeout(() => {
                if (willShow) {
                    ov.classList.add('active');
                    btn.classList.add('active');
                } else {
                    ov.classList.remove('active');
                    btn.classList.remove('active');
                }
                document.getElementById('loading').classList.remove('active');
                document.getElementById('diffContainer').style.display = '';
                ov.style.display = '';
            }, 10);
        }

        function toggleBook(chip, bookIdx) {
            const panel = document.getElementById('chapPanel' + bookIdx);
            const wasActive = panel.classList.contains('active');

            document.querySelectorAll('.chapter-panel.active').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.book-chip.expanded').forEach(c => c.classList.remove('expanded'));

            if (!wasActive) {
                panel.classList.add('active');
                chip.classList.add('expanded');
            }
        }

        function jumpToRow(rowIdx) {
            const rows = document.getElementById('diffBody').children;
            for (const row of rows) {
                if (parseInt(row.dataset.row) === rowIdx) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.classList.add('highlight');
                    setTimeout(() => row.classList.remove('highlight'), 2000);
                    return;
                }
            }
            let closest = null, closestDist = Infinity;
            for (const row of rows) {
                const ri = parseInt(row.dataset.row);
                if (ri >= rowIdx && ri - rowIdx < closestDist) {
                    closestDist = ri - rowIdx;
                    closest = row;
                }
            }
            if (closest) {
                closest.scrollIntoView({ behavior: 'smooth', block: 'center' });
                closest.classList.add('highlight');
                setTimeout(() => closest.classList.remove('highlight'), 2000);
            }
        }

        function jumpToDiff(dir) {
            if (diffIndices.length === 0) return;

            const prev = document.querySelector('.diff-row.highlight');
            if (prev) prev.classList.remove('highlight');

            if (dir === 1) {
                currentDiffIndex = (currentDiffIndex + 1) % diffIndices.length;
            } else {
                currentDiffIndex = (currentDiffIndex - 1 + diffIndices.length) % diffIndices.length;
            }

            const rows = document.getElementById('diffBody').children;
            const target = rows[diffIndices[currentDiffIndex]];
            if (target) {
                target.classList.add('highlight');
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function highlightWordDiffs(text1, text2) {
            if (!text1 || !text2) return { left: escapeHtml(text1 || ''), right: escapeHtml(text2 || '') };

            const words1 = text1.split(/(\s+)/);
            const words2 = text2.split(/(\s+)/);

            const m = words1.length, n = words2.length;
            const dp = new Int16Array((m + 1) * (n + 1));
            const W = n + 1;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (words1[i-1] === words2[j-1]) dp[i*W+j] = dp[(i-1)*W+(j-1)] + 1;
                    else dp[i*W+j] = Math.max(dp[(i-1)*W+j], dp[i*W+(j-1)]);
                }
            }

            const match1 = new Uint8Array(m);
            const match2 = new Uint8Array(n);
            let i = m, j = n;
            while (i > 0 && j > 0) {
                if (words1[i-1] === words2[j-1]) { match1[--i] = 1; match2[--j] = 1; }
                else if (dp[(i-1)*W+j] >= dp[i*W+(j-1)]) i--;
                else j--;
            }

            let html1 = '', html2 = '';
            for (let k = 0; k < m; k++) {
                html1 += match1[k] ? escapeHtml(words1[k]) : `<span class="char-diff-remove">${escapeHtml(words1[k])}</span>`;
            }
            for (let k = 0; k < n; k++) {
                html2 += match2[k] ? escapeHtml(words2[k]) : `<span class="char-diff-add">${escapeHtml(words2[k])}</span>`;
            }

            return { left: html1, right: html2 };
        }
    </script>
</body>
